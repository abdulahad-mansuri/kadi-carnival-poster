<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Fredoka+One&family=Titan+One&family=Baloo+2:wght@700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0010;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Fredoka One', cursive;
  }

  .poster {
    width: 420px;
    min-height: 600px;
    background: radial-gradient(ellipse at 50% 0%, #ff6a00 0%, #c0392b 25%, #6d1b7b 55%, #1a0030 85%);
    position: relative;
    overflow: hidden;
    border-radius: 18px;
    border: 4px solid #ffd700;
    box-shadow: 0 0 60px #ff6a00aa, 0 0 120px #ff000055, inset 0 0 80px #00000066;
    padding-bottom: 10px;
  }

  /* Starburst rays */
  .rays {
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    z-index: 0;
    animation: rotateSlow 30s linear infinite;
  }

  @keyframes rotateSlow {
    from { transform: translateX(-50%) rotate(0deg); }
    to { transform: translateX(-50%) rotate(360deg); }
  }

  .rays::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(
      rgba(255,220,50,0.18) 0deg 10deg,
      transparent 10deg 20deg
    );
    border-radius: 50%;
  }

  /* Fireworks particles */
  .spark {
    position: absolute;
    border-radius: 50%;
    animation: sparkle 2s ease-in-out infinite;
    z-index: 1;
  }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Top banner */
  .top-banner {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 18px 20px 0;
  }

  .tag-line {
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 13px;
    color: #fff;
    background: linear-gradient(90deg, #ff6a00, #ffcc00, #ff6a00);
    padding: 5px 18px;
    border-radius: 20px;
    letter-spacing: 2px;
    border: 2px solid rgba(255,255,255,0.4);
    display: inline-block;
    margin-bottom: 8px;
    text-transform: uppercase;
    box-shadow: 0 0 12px #ff6a00;
  }

  /* Main title block */
  .main-title {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 10px;
    margin-top: 6px;
  }

  .word-kadi {
    font-family: 'Titan One', cursive;
    font-size: 78px;
    line-height: 1;
    color: #ffd700;
    text-shadow:
      0 0 10px #ffaa00,
      0 0 25px #ff8800,
      3px 3px 0 #8b4500,
      6px 6px 0 #5c2d00;
    animation: glowPulse 2s ease-in-out infinite;
    display: block;
    letter-spacing: 4px;
  }

  .word-weekend {
    font-family: 'Titan One', cursive;
    font-size: 56px;
    line-height: 0.95;
    color: #fff;
    text-shadow:
      0 0 8px #88aaff,
      3px 3px 0 #003399,
      6px 6px 0 #001155;
    display: block;
    letter-spacing: 2px;
  }

  .word-carnival {
    font-family: 'Titan One', cursive;
    font-size: 62px;
    line-height: 0.95;
    color: #ff4444;
    text-shadow:
      0 0 12px #ff0000,
      3px 3px 0 #880000,
      6px 6px 0 #440000;
    animation: glowPulse 1.5s ease-in-out infinite alternate;
    display: block;
  }

  .word-mela {
    font-family: 'Titan One', cursive;
    font-size: 82px;
    line-height: 0.95;
    color: transparent;
    background: linear-gradient(135deg, #00e5ff, #00bfff, #007fff, #00e5ff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    animation: shineMela 3s linear infinite;
    text-shadow: none;
    filter: drop-shadow(0 0 12px #00e5ff99);
    display: block;
    letter-spacing: 6px;
  }

  @keyframes shineMela {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  @keyframes glowPulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3) drop-shadow(0 0 15px currentColor); }
  }

  /* Bulb border decorations */
  .bulb-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 8px 0;
    z-index: 10;
    position: relative;
  }

  .bulb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    animation: bulbBlink 1.2s ease-in-out infinite;
  }

  .bulb:nth-child(odd) { animation-delay: 0.6s; }

  @keyframes bulbBlink {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px currentColor; }
    50% { opacity: 0.3; box-shadow: none; }
  }

  /* Themes badge */
  .themes-badge {
    position: relative;
    z-index: 10;
    text-align: center;
    margin: 4px auto 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .themes-text {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: #ffdd00;
    background: rgba(0,0,0,0.4);
    border: 2px solid #ffdd00;
    border-radius: 30px;
    padding: 4px 20px;
    letter-spacing: 3px;
    box-shadow: 0 0 15px #ffaa0088;
    text-transform: uppercase;
  }

  .star-icon { font-size: 20px; animation: spinStar 3s linear infinite; display: inline-block; }
  @keyframes spinStar { to { transform: rotate(360deg); } }

  /* Coming Soon */
  .coming-soon {
    position: relative;
    z-index: 10;
    text-align: center;
    margin: 8px 10px 6px;
  }

  .coming-soon-text {
    font-family: 'Titan One', cursive;
    font-size: 52px;
    color: #ff6600;
    text-shadow:
      0 0 15px #ff4400,
      3px 3px 0 #882200,
      6px 6px 0 #441100;
    letter-spacing: 2px;
    animation: comingSoonPulse 1.8s ease-in-out infinite;
    display: block;
  }

  @keyframes comingSoonPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); filter: brightness(1.2); }
  }

  /* Divider */
  .divider {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    margin: 4px 20px;
    gap: 10px;
  }
  .divider-line { flex: 1; height: 2px; background: linear-gradient(90deg, transparent, #ffd700, transparent); }
  .divider-diamond { color: #ffd700; font-size: 14px; }

  /* Contact box */
  .contact-box {
    position: relative;
    z-index: 10;
    margin: 6px 14px;
    background: rgba(0, 30, 100, 0.75);
    border: 2.5px solid #4488ff;
    border-radius: 12px;
    padding: 10px 14px;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 20px #2244ff66, inset 0 0 15px rgba(68,136,255,0.1);
  }

  .contact-title {
    text-align: center;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 11px;
    color: #aaccff;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 12px;
  }

  .contact-item {
    display: flex;
    flex-direction: column;
  }

  .contact-name {
    font-family: 'Fredoka One', cursive;
    font-size: 12.5px;
    color: #ffdd88;
    letter-spacing: 0.5px;
  }

  .contact-number {
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 14px;
    color: #ffffff;
    letter-spacing: 1px;
  }

  /* Address box */
  .address-box {
    position: relative;
    z-index: 10;
    margin: 8px 14px 14px;
    background: linear-gradient(135deg, #1a5276, #2980b9);
    border: 3px solid #5dade2;
    border-radius: 12px;
    padding: 10px 16px;
    text-align: center;
    box-shadow: 0 0 25px #2980b988;
  }

  .address-label {
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 10px;
    color: #a9cce3;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .address-text {
    font-family: 'Titan One', cursive;
    font-size: 20px;
    color: #ffffff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    letter-spacing: 1px;
  }

  /* Decorative elements */
  .deco-rides {
    position: absolute;
    z-index: 2;
    font-size: 40px;
    opacity: 0.25;
  }

  .ride-tl { top: 10%; left: 2%; animation: floatRide 4s ease-in-out infinite; }
  .ride-tr { top: 8%; right: 2%; animation: floatRide 4s ease-in-out infinite 1s; }
  .ride-ml { top: 42%; left: 1%; animation: floatRide 5s ease-in-out infinite 0.5s; font-size: 32px; }
  .ride-mr { top: 40%; right: 1%; animation: floatRide 5s ease-in-out infinite 1.5s; font-size: 32px; }

  @keyframes floatRide {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  /* Floating stars */
  .float-star {
    position: absolute;
    color: #ffd700;
    animation: floatStar 3s ease-in-out infinite;
    z-index: 3;
    font-size: 16px;
    opacity: 0.7;
  }

  @keyframes floatStar {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
    50% { transform: translateY(-15px) rotate(180deg); opacity: 1; }
  }
</style>
</head>
<body>

<div class="poster">

</body>
